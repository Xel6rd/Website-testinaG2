<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xel6r Intro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ccefff 0%, #8fd3ff 50%, #62b6f7 100%);
      overflow: hidden;
      position: relative;
    }

    .card {
      width: 360px;
      padding: 32px 26px;
      text-align: center;
      color: white;
      background: rgba(0, 0, 0, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
      border-radius: 28px;
    }

    .name {
      font-size: 2.4rem;
      font-weight: 600;
      color: #ffd400;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .desc {
      font-size: 1.05rem;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.96);
      margin-bottom: 18px;
    }

    .location {
      font-size: 1rem;
      margin-bottom: 26px;
      color: rgba(255, 255, 255, 0.92);
    }

    .location i {
      margin-right: 8px;
    }

    .icons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .icons a {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      font-size: 22px;
      background: rgba(255, 255, 255, 0.12);
      transition: 0.25s ease;
    }

    .icons a:hover {
      transform: translateY(-4px) scale(1.08);
      background: rgba(255, 255, 255, 0.25);
      color: #ffd400;
    }

    @media (max-width: 420px) {
      .card {
        width: 90%;
      }

      .name {
        font-size: 2rem;
      }

      .desc {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="name">Xel6r</div>
    <div class="desc">Hobbyist Photographer, car enthusiast, editor, gamer, otaku</div>
    <div class="location"><i class="fa-solid fa-location-dot"></i>Philippines</div>

    <div class="icons">
      <a href="https://www.roblox.com/users/1883019801/profile" target="_blank"><i class="fa-solid fa-square"></i></a>
      <a href="https://discord.com" target="_blank"><i class="fa-brands fa-discord"></i></a>
      <a href="https://spotify.com" target="_blank"><i class="fa-brands fa-spotify"></i></a>
    </div>
  </div>
</body>
